<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joaquín Bernardis — Director de Cine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Cormorant:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #222222;
      --fg: #ffffff;
      --muted: #888888;
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      padding: 2rem 2.5rem;
    }

    a { color: inherit; text-decoration: none; }

    /*Top Bar*/
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .location {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .lang-toggle {
      display: flex;
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      padding: 0 0.5rem;
      transition: color 0.2s;
      text-transform: uppercase;
    }
    .lang-btn:first-child { border-right: 1px solid var(--border); }
    .lang-btn.active { color: var(--fg); }
    .lang-btn:hover { color: var(--fg); }

    /*Hero*/
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.6rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(3.5rem, 10vw, 9rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.1s forwards;
    }

     /*Director de cine*/
    .subtitle {
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.9s ease 0.25s forwards;
    }

    /*(Trabajos)*/
    .nav-middle {
      display: flex;
      justify-content: center;
      padding: 1rem 0 1rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }

    .nav-middle a {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-middle a:hover { color: var(--fg); }

    /*(Sobre mí / Contacto)*/
    .nav-bottom {
      display: flex;
      justify-content: center;
      gap: 4rem;
      padding-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.5s forwards;
    }

    .nav-bottom a {
      font-size: clamp(0.85rem, 1.8vw, 1.1rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-bottom a:hover { color: var(--fg); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { padding: 1.5rem; }
      .nav-bottom { gap: 2.5rem; }
    }
  </style>
</head>
<body>


  <header>
    <span class="location" data-es="Buenos Aires, Argentina" data-en="Buenos Aires, Argentina">Buenos Aires, Argentina</span>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </header>


  <div class="hero">
    <h1>Joaquín Bernardis</h1>
    <p class="subtitle" data-es="Director de Cine" data-en="Film Director">Director de Cine</p>
  </div>


  <div class="nav-middle">
    <a href="trabajos.html" data-es="Trabajos" data-en="Work">Trabajos</a>
  </div>


  <nav class="nav-bottom">
    <a href="sobre-mi.html" data-es="Sobre mí" data-en="About">Sobre mí</a>
    <a href="contacto.html" data-es="Contacto" data-en="Contact">Contacto</a>
  </nav>

  <script>
    function setLang(lang) {
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-es]').forEach(el => {
        el.textContent = el.dataset[lang];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
      });
    }
    const saved = localStorage.getItem('lang') || 'es';
    if (saved === 'en') setLang('en');
  </script>

</body>
</html>
