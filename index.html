<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joaquín Bernardis — Director de Cine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Cormorant:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #222222;
      --fg: #ffffff;
      --muted: #888888;
      --border: rgba(255,255,255,0.08);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      padding: 2rem 2.5rem;
    }

    a { color: inherit; text-decoration: none; }

    /* Top Bar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .location {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .lang-toggle {
      display: flex;
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      padding: 0 0.5rem;
      transition: color 0.2s;
      text-transform: uppercase;
    }
    .lang-btn:first-child { border-right: 1px solid var(--border); }
    .lang-btn.active { color: var(--fg); }
    .lang-btn:hover { color: var(--fg); }

    /* Hero */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.6rem;
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
      will-change: transform;
    }

    h1 {
      font-family: 'Cormorant', serif;
      font-style: italic;
      font-size: clamp(3.5rem, 10vw, 9rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.1s forwards;
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.9s ease 0.25s forwards;
    }

    /* Nav Trabajos */
    .nav-middle {
      display: flex;
      justify-content: center;
      padding: 1rem 0 1rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease, height 0.5s ease, padding 0.5s ease;
      will-change: transform;
    }

    .nav-middle a {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-middle a:hover { color: var(--fg); }

    /* Nav Bottom */
    .nav-bottom {
      display: flex;
      justify-content: center;
      gap: 4rem;
      padding-bottom: 12vh;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.5s forwards;
    }

    .nav-bottom a {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-bottom a:hover { color: var(--fg); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { padding: 1.5rem; }
      .nav-bottom { gap: 2.5rem; }
    }

    /* =============================================
       SECCIÓN DE TRABAJOS
    ============================================= */

    .videos-container {
      opacity: 0;
      visibility: hidden;
      height: 0;
      overflow: hidden;
      width: 100%;
      transition: opacity 0.6s ease 0.3s;
    }

    /* Grid de thumbnails */
    .thumbnails-grid {
      display: grid;
      grid-template-columns: 320px 320px;
      gap: 1.5rem;
      margin: 0 auto;
      width: fit-content;
    }

    .thumbnail-card {
      width: 320px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid var(--border);
      transition: border-color 0.3s, transform 0.3s;
    }

    .thumbnail-card:hover {
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-3px);
    }

    .thumbnail-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    /* Overlay play */
    .thumbnail-card .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .thumbnail-card:hover .play-overlay { opacity: 1; }

    .play-overlay svg {
      width: 52px;
      height: 52px;
      opacity: 0.9;
    }

    /* Título "Trabajos" sobre el grid */
    .trabajos-titulo {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      display: block;
    }

    /* Wrapper centrado que agrupa título + grid */
    .thumbnails-wrapper {
      width: fit-content;
      margin: 0 auto;
    }

    .videos-container.panel-abierto {
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }

    .videos-container.panel-abierto .thumbnails-wrapper {
      display: none;
    }

    /* Flecha volver */
    .btn-volver {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0 0 1.2rem 0;
      transition: color 0.2s;
    }

    .btn-volver:hover { color: var(--fg); }

    .btn-volver svg {
      width: 14px;
      height: 14px;
      transition: transform 0.2s;
    }

    .btn-volver:hover svg { transform: translateX(-3px); }

    .videos-container.panel-abierto .btn-volver {
      display: flex;
    }

    /* Panel expandido */
    .expanded-panel {
      display: none;
      gap: 2rem;
      align-items: flex-start;
      animation: fadeUp 0.5s ease forwards;
    }

    .expanded-panel.active {
      display: grid;
      grid-template-columns: 1fr auto;
    }

    /* Player */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      flex: 1;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Info panel lateral */
    .info-panel {
      width: 240px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      padding-left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .info-panel h2 {
      font-family: 'Cormorant', serif;
      font-style: italic;
      font-size: 1.4rem;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }

    .info-sinopsis {
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255,255,255,0.7);
    }

    .info-credits {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .credit-row {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .credit-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .credit-value {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    /* Botón cerrar */
    .btn-cerrar {
      display: block;
      margin-top: 0.5rem;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      padding: 0;
      transition: color 0.2s;
    }

    .btn-cerrar:hover { color: var(--fg); }

    /* Responsive */
    @media (max-width: 720px) {
      .expanded-panel.active {
        grid-template-columns: 1fr;
      }
      .info-panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        padding-left: 0;
        padding-top: 1.2rem;
      }
    }

    /* Estados activos */
    body.view-trabajos .hero {
      transform: translateY(-5vh) scale(0.85);
      margin-bottom: -5vh;
    }

    body.view-trabajos .nav-middle {
      opacity: 0 !important;
      pointer-events: none;
      height: 0;
      padding: 0;
    }

    body.view-trabajos .videos-container {
      opacity: 1;
      visibility: visible;
      height: auto;
      padding-top: 2rem;
      padding-bottom: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 45vh;
    }
  </style>
</head>
<body>

  <header>
    <span class="location" data-es="Buenos Aires, Argentina" data-en="Buenos Aires, Argentina">Buenos Aires, Argentina</span>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <div class="hero">
    <h1>Joaquín Bernardis</h1>
    <p class="subtitle" data-es="Director de Cine" data-en="Film Director">Director de Cine</p>
  </div>

  <div class="nav-middle">
    <a href="#" id="btn-trabajos" data-es="Trabajos" data-en="Work">Trabajos</a>
  </div>

  <!-- ===== SECCIÓN TRABAJOS ===== -->
  <div class="videos-container" id="seccion-videos">

    <button class="btn-volver" onclick="cerrarVideo()">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span data-es="Trabajos" data-en="Work">Trabajos</span>
    </button>

    <div class="thumbnails-wrapper">
      <span class="trabajos-titulo" data-es="Trabajos" data-en="Work">Trabajos</span>

      <!-- Grid de thumbnails -->
      <div class="thumbnails-grid">

        <div class="thumbnail-card" onclick="abrirVideo('en-la-mira')">
          <img src="img/en-la-mira.png" alt="En la mira">
          <div class="play-overlay">
            <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="26" cy="26" r="25" stroke="white" stroke-width="1.5"/>
              <polygon points="21,17 38,26 21,35" fill="white"/>
            </svg>
          </div>
        </div>

        <div class="thumbnail-card" onclick="abrirVideo('el-precio-de-la-libertad')">
          <img src="img/el-precio-de-la-libertad.png" alt="El precio de la libertad">
          <div class="play-overlay">
            <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="26" cy="26" r="25" stroke="white" stroke-width="1.5"/>
              <polygon points="21,17 38,26 21,35" fill="white"/>
            </svg>
          </div>
        </div>

      </div>
    </div>

    <!-- Panel expandido: En la mira -->
    <div class="expanded-panel" id="panel-en-la-mira">
      <div class="video-wrapper">
        <iframe src="https://player.vimeo.com/video/1184653363?badge=0&autopause=0&player_id=0&app_id=58479&title=0&byline=0&portrait=0"
          frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="info-panel">
        <div>
          <h2>En la mira</h2>
        </div>
        <p class="info-sinopsis">
          <!-- SINOPSIS: reemplazá este texto con la sinopsis del corto -->
          Sinopsis del corto...
        </p>
        <div class="info-credits">
          <div class="credit-row">
            <span class="credit-label" data-es="Dirección" data-en="Direction">Dirección</span>
            <span class="credit-value"><!-- Nombre del director --></span>
          </div>
          <div class="credit-row">
            <span class="credit-label" data-es="Guión" data-en="Screenplay">Guión</span>
            <span class="credit-value"><!-- Nombre del guionista --></span>
          </div>
          <div class="credit-row">
            <span class="credit-label" data-es="Producción" data-en="Production">Producción</span>
            <span class="credit-value"><!-- Nombre del productor --></span>
          </div>
          <div class="credit-row">
            <span class="credit-label" data-es="Fotografía" data-en="Cinematography">Fotografía</span>
            <span class="credit-value"><!-- Director de fotografía --></span>
          </div>
          <!-- Podés agregar más filas copiando el bloque .credit-row -->
        </div>
      </div>
    </div>

    <!-- Panel expandido: El precio de la libertad -->
    <div class="expanded-panel" id="panel-el-precio-de-la-libertad">
      <div class="video-wrapper">
        <iframe src="https://player.vimeo.com/video/1184652977?badge=0&autopause=0&player_id=0&app_id=58479&title=0&byline=0&portrait=0"
          frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="info-panel">
        <div>
          <h2>El precio de la libertad</h2>
        </div>
        <p class="info-sinopsis">
          <!-- SINOPSIS: reemplazá este texto con la sinopsis del corto -->
          Sinopsis del corto...
        </p>
        <div class="info-credits">
          <div class="credit-row">
            <span class="credit-label" data-es="Dirección" data-en="Direction">Dirección</span>
            <span class="credit-value"><!-- Nombre del director --></span>
          </div>
          <div class="credit-row">
            <span class="credit-label" data-es="Guión" data-en="Screenplay">Guión</span>
            <span class="credit-value"><!-- Nombre del guionista --></span>
          </div>
          <div class="credit-row">
            <span class="credit-label" data-es="Producción" data-en="Production">Producción</span>
            <span class="credit-value"><!-- Nombre del productor --></span>
          </div>
          <div class="credit-row">
            <span class="credit-label" data-es="Fotografía" data-en="Cinematography">Fotografía</span>
            <span class="credit-value"><!-- Director de fotografía --></span>
          </div>
          <!-- Podés agregar más filas copiando el bloque .credit-row -->
        </div>
      </div>
    </div>

  </div>
  <!-- ===== FIN SECCIÓN TRABAJOS ===== -->

  <nav class="nav-bottom">
    <a href="sobre-mi.html" data-es="Sobre mí" data-en="About">Sobre mí</a>
    <a href="contacto.html" data-es="Contacto" data-en="Contact">Contacto</a>
  </nav>

  <script>
    // Idioma
    function setLang(lang) {
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-es]').forEach(el => {
        el.textContent = el.dataset[lang];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
      });
    }
    const saved = localStorage.getItem('lang') || 'es';
    if (saved === 'en') setLang('en');

    // Botón "Trabajos"
    document.getElementById('btn-trabajos').addEventListener('click', function(e) {
      e.preventDefault();
      document.body.classList.add('view-trabajos');
    });

    // Abrir video
    function abrirVideo(id) {
      cerrarVideo(); // detiene cualquier video previo
      const contenedor = document.getElementById('seccion-videos');
      const panel = document.getElementById('panel-' + id);
      if (panel) {
        contenedor.classList.add('panel-abierto');
        panel.classList.add('active');
        contenedor.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // Cerrar video — detiene el iframe reseteando el src
    function cerrarVideo() {
      document.querySelectorAll('.expanded-panel').forEach(p => {
        if (p.classList.contains('active')) {
          const iframe = p.querySelector('iframe');
          if (iframe) {
            const src = iframe.src;
            iframe.src = '';
            iframe.src = src;
          }
          p.classList.remove('active');
        }
      });
      document.getElementById('seccion-videos').classList.remove('panel-abierto');
    }
  </script>

</body>
</html>
