<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joaquín Bernardis — Director de Cine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Cormorant:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #222222;
      --fg: #ffffff;
      --muted: #888888;
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      padding: 2rem 2.5rem;
    }

    a { color: inherit; text-decoration: none; }

    /*Top Bar*/
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .location {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .lang-toggle {
      display: flex;
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      padding: 0 0.5rem;
      transition: color 0.2s;
      text-transform: uppercase;
    }
    .lang-btn:first-child { border-right: 1px solid var(--border); }
    .lang-btn.active { color: var(--fg); }
    .lang-btn:hover { color: var(--fg); }

    /*Hero*/
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.6rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(3.5rem, 10vw, 9rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.1s forwards;
    }

     /*Director de cine*/
    .subtitle {
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.9s ease 0.25s forwards;
    }

    /*(Trabajos)*/
    .nav-middle {
      display: flex;
      justify-content: center;
      padding: 1rem 0 1rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }

    .nav-middle a {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-middle a:hover { color: var(--fg); }

    /* (Sobre mí / Contacto) */
    .nav-bottom {
      display: flex;
      justify-content: center;
      gap: 4rem;
      padding-bottom: 12vh; /* <-- Aumentamos este valor (antes 2.5rem) para subir los menús */
      opacity: 0;
      animation: fadeUp 0.9s ease 0.5s forwards;
    }

    .nav-bottom a {
      font-size: clamp(1rem, 2.5vw, 1.4rem); /* <-- Ahora es exactamente igual a .nav-middle a */
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }

    .nav-bottom a:hover { color: var(--fg); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { padding: 1.5rem; }
      .nav-bottom { gap: 2.5rem; }
    }

    /* --- ANIMACIONES Y ESTILOS PARA LA SECCIÓN DE TRABAJOS --- */
    
    /* Preparamos el hero y el menú para que se animen suavemente */
    .hero, .nav-middle {
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease, height 0.5s ease, padding 0.5s ease;
      will-change: transform;
    }

    /* Contenedor de videos oculto por defecto */
    .videos-container {
      opacity: 0;
      visibility: hidden;
      height: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* Crea columnas responsivas */
      gap: 2rem;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      transition: opacity 0.8s ease 0.4s; /* Aparece con un ligero retraso */
    }

    /* Truco para que los iframes de YouTube mantengan el formato 16:9 */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; 
      height: 0;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* --- CLASES ACTIVAS CUANDO HACEMOS CLIC EN TRABAJOS --- */
    body.view-trabajos .hero {
      transform: translateY(-5vh) scale(0.85); /* Sube un poco y se achica levemente */
      margin-bottom: -5vh; 
    }

    body.view-trabajos .nav-middle {
      opacity: 0;
      pointer-events: none;
      height: 0;
      padding: 0;
    }

    body.view-trabajos .videos-container {
      opacity: 1;
      visibility: visible;
      height: auto;
      padding-top: 2rem;
      padding-bottom: 2rem;
    }
  </style>
</head>
<body>


  <header>
    <span class="location" data-es="Buenos Aires, Argentina" data-en="Buenos Aires, Argentina">Buenos Aires, Argentina</span>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </header>


  <div class="hero">
    <h1>Joaquín Bernardis</h1>
    <p class="subtitle" data-es="Director de Cine" data-en="Film Director">Director de Cine</p>
  </div>


  <div class="nav-middle">
    <a href="#" id="btn-trabajos" data-es="Trabajos" data-en="Work">Trabajos</a>
  </div>

  <div class="videos-container" id="seccion-videos">
    
    <div class="video-wrapper">
  <iframe src="https://player.vimeo.com/video/1184653363?badge=0&autopause=0&player_id=0&app_id=58479&title=0&byline=0&portrait=0" title="En la mira" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</div>

<div class="video-wrapper">
  <iframe src="https://player.vimeo.com/video/1184652977?badge=0&autopause=0&player_id=0&app_id=58479&title=0&byline=0&portrait=0" title="El precio de la libertad" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</div>

  </div>

  <nav class="nav-bottom">
    <a href="sobre-mi.html" data-es="Sobre mí" data-en="About">Sobre mí</a>
    <a href="contacto.html" data-es="Contacto" data-en="Contact">Contacto</a>
  </nav>

  <script>
    function setLang(lang) {
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-es]').forEach(el => {
        el.textContent = el.dataset[lang];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === lang);
      });
    }
    const saved = localStorage.getItem('lang') || 'es';
    if (saved === 'en') setLang('en');

    // Lógica para el botón "Trabajos"
    const btnTrabajos = document.getElementById('btn-trabajos');
    
    btnTrabajos.addEventListener('click', function(event) {
      event.preventDefault(); // Evita que la página intente saltar hacia arriba
      document.body.classList.add('view-trabajos'); // Agrega la clase que detona las animaciones CSS
    });
  </script>

</body>
</html>
